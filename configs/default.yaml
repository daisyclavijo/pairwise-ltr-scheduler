# Capstone config — primary scale: 1000 prompts
# Compare: FCFS | LTR (main paper) | PARS+ProD-M+Priority (ours)
#
# Prefer configs/live_run.yaml for Colab Pro / A100 (same 1000-prompt scale).
# Chunked labeling: --limit 1000 --chunk-size 50 --resume

model:
  backbone: bert-base-uncased
  margin: 1.0
  min_length_diff: 0.2

llm:
  # llama32 fits Colab T4/A100 with 4-bit quantization
  profile: llama32
  load_in_4bit: true
  max_prompt_tokens: 4096
  profiles:
    llama32:
      model: meta-llama/Llama-3.2-3B-Instruct
      max_new_tokens: 512
    llama31:
      model: meta-llama/Meta-Llama-3.1-8B-Instruct
      max_new_tokens: 512
    qwen25:
      model: Qwen/Qwen2.5-7B-Instruct
      max_new_tokens: 512
    deepseek_r1:
      model: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
      max_new_tokens: 2048

prod_m:
  # 3 samples/prompt at 1000-prompt scale (use 5 only for tiny debug runs)
  num_samples: 3
  num_bins: 32
  max_length: 2048
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  epochs: 15
  batch_size: 32
  learning_rate: 0.001
  encode_batch_size: 4

training:
  epochs: 8
  batch_size: 16
  learning_rate: 0.00002
  max_prompt_length: 512
  max_pairs: 50000

datasets:
  name: all
  limit: 1000
  per_dataset:
    gsm8k: 200
    math: 200
    livecodebench: 200
    wildchat: 200
    longbench: 200
  eval_limit: 1000

scheduler:
  # default serving policy: our PARS method
  # options: fcfs | ltr | pars | oracle
  policy: pars
  batch_size: 8
  starvation_seconds: 120   # promote waiting requests (fairness)

priority:
  # added to rank score; lower effective score is served sooner
  high_boost: -3.0
  normal_boost: 0.0
  low_boost: 3.0

simulation:
  num_requests: 1000
  arrival_rate: 8.0
  seed: 42
