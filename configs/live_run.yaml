# Primary Colab / report config — 1000 prompts.
# Matches the main experiment scale used in README and notebooks.
#
# Usage:
#   python scripts/generate_labels.py --config configs/live_run.yaml \
#       --limit 1000 --chunk-size 50 --resume --num-samples 3 --device cuda \
#       --backup-dir /content/drive/MyDrive/capstone_results
#   python scripts/train_prod_m.py --config configs/live_run.yaml \
#       --target single --output checkpoints/ltr_pointwise.pt --device cuda
#   python scripts/train_ranker.py --config configs/live_run.yaml \
#       --train-samples 1000 --device cuda
#   python scripts/evaluate.py --config configs/live_run.yaml --limit 1000 --device cuda
#   python scripts/plot_results.py --config configs/live_run.yaml --limit 1000 --device cuda \
#       --out-dir /content/drive/MyDrive/capstone_results/figures
#
# Live GPU (HF fallback if vLLM fails):
#   python scripts/evaluate_live_hf.py --config configs/live_run.yaml --limit 1000 --device cuda

model:
  backbone: bert-base-uncased
  margin: 1.0
  min_length_diff: 0.2

llm:
  profile: llama32
  load_in_4bit: true
  max_prompt_tokens: 4096
  profiles:
    llama32:
      model: meta-llama/Llama-3.2-3B-Instruct
      max_new_tokens: 512
    llama31:
      model: meta-llama/Meta-Llama-3.1-8B-Instruct
      max_new_tokens: 512
    qwen25:
      model: Qwen/Qwen2.5-7B-Instruct
      max_new_tokens: 512
    deepseek_r1:
      model: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
      max_new_tokens: 2048

prod_m:
  # 3 samples/prompt is the speed/quality tradeoff at 1000-prompt scale
  num_samples: 3
  num_bins: 32
  max_length: 2048
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  epochs: 15
  batch_size: 32
  learning_rate: 0.001
  encode_batch_size: 4

training:
  epochs: 8
  batch_size: 16
  learning_rate: 0.00002
  max_prompt_length: 512
  max_pairs: 50000

datasets:
  name: all
  limit: 1000
  per_dataset:
    gsm8k: 200
    math: 200
    livecodebench: 200
    wildchat: 200
    longbench: 200
  eval_limit: 1000

scheduler:
  policy: pars
  batch_size: 8
  starvation_seconds: 120

priority:
  high_boost: -3.0
  normal_boost: 0.0
  low_boost: 3.0

simulation:
  num_requests: 1000
  arrival_rate: 8.0
  seed: 42

live:
  gpu_memory_utilization: 0.85
  max_model_len: 4096
